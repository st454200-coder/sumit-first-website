<!DOCTYPE html>
<html>
    <head>
      <title>
        Rock Paper Scissors
      </title>
      <link rel="stylesheet" href="styles/13.1-rock-paper-scissors.css">
    </head>

    <body>
      <p class="rock-paper-scissors">
        Rock Paper Scissors 
      </p>

      
      <!-- have remove onclick with eventListener in js -->
      <button class="js-rock-button">
        <img src="images/rock.jpg" class="move-icon">
      </button>

       <button class="js-paper-button">
        <img src="images/paper.jpg" class="move-icon">
      </button>
      
      <button class="js-scissors-button"  >
        <img src="images/scissors.jpg" class="move-icon">
      </button>

      <p class="js-result result"></p>
      <p class="js-moves">
      </p>
      <p class="js-score score"></p>

      <button onclick="
      score.wins = 0;
      score.losses = 0;
      score.ties = 0;
      localStorage.removeItem(score);//it deleted our data frome localStorage
      updateScoreElement();
      " class="reset-score-button js-reset-button">
      Reset Score
      </button>
      <button class="auto-play-button js-autoplay-button"  
         onclick="autoPlay();" >
        Auto Play
      </button>

      <script src="13.1-rock-paper-scissor.js"></script>
    </body>
</html>
